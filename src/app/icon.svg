<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <linearGradient id="maroon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b2238" />
      <stop offset="100%" stop-color="#4a0e1a" />
    </linearGradient>
    <linearGradient id="navy-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#324a70" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#92400e" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.18" />
    </filter>
  </defs>

  <!-- Shield with Drop Shadow -->
  <g filter="url(#shadow)">
    <!-- Left Shield Segment (Maroon) -->
    <path d="M256,40 L96,100 L96,280 C96,380 256,472 256,472 Z" fill="url(#maroon-grad)" />

    <!-- Right Shield Segment (Navy) -->
    <path d="M256,40 L416,100 L416,280 C416,380 256,472 256,472 Z" fill="url(#navy-grad)" />

    <!-- Golden Vertical Divider line (thin, elegant) -->
    <line x1="256" y1="40" x2="256" y2="472" stroke="url(#gold-grad)" stroke-width="4" opacity="0.4" />

    <!-- Shield Border (Gold) -->
    <path d="M256,40 L416,100 L416,280 C416,380 256,472 256,472 C256,472 96,380 96,280 L96,100 Z" fill="none" stroke="url(#gold-grad)" stroke-width="14" stroke-linejoin="round" stroke-linecap="round" />
  </g>

  <!-- Center Emblem: Laurel Wreath & Star & Monogram -->
  <g>
    <!-- Star of leadership -->
    <polygon points="256,110 264,130 286,130 268,143 275,164 256,151 237,164 244,143 226,130 248,130" fill="url(#gold-grad)" />

    <!-- Laurel Wreath Leaves (Left and Right sides) -->
    <!-- Left side leaves -->
    <path d="M190,230 Q170,255 165,290" fill="none" stroke="url(#gold-grad)" stroke-width="4" stroke-linecap="round" opacity="0.85" />
    <path d="M190,230 C185,220 170,220 170,230 C170,240 185,240 190,230 Z" fill="url(#gold-grad)" />
    <path d="M178,255 C170,245 158,248 158,258 C158,268 170,265 178,255 Z" fill="url(#gold-grad)" />
    <path d="M168,285 C160,275 148,280 148,290 C148,300 160,295 168,285 Z" fill="url(#gold-grad)" />
    
    <!-- Right side leaves -->
    <path d="M322,230 Q342,255 347,290" fill="none" stroke="url(#gold-grad)" stroke-width="4" stroke-linecap="round" opacity="0.85" />
    <path d="M322,230 C327,220 342,220 342,230 C342,240 327,240 322,230 Z" fill="url(#gold-grad)" />
    <path d="M334,255 C342,245 354,248 354,258 C354,268 342,265 334,255 Z" fill="url(#gold-grad)" />
    <path d="M344,285 C352,275 364,280 364,290 C364,300 352,295 344,285 Z" fill="url(#gold-grad)" />

    <!-- Interlocking / stacked academic monogram text "CCGS" -->
    <text x="256" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="82" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1">CCGS</text>
    
    <!-- Elegant gold horizontal line -->
    <path d="M190,345 L322,345" stroke="url(#gold-grad)" stroke-width="4" stroke-linecap="round" />
    
    <!-- Mini graduation cap or diamond indicator -->
    <path d="M256,365 L271,375 L256,385 L241,375 Z" fill="url(#gold-grad)" />
  </g>
</svg>
